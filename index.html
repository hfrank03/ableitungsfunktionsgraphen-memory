<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1C6D87">
<title>Funktionsgraphen-Memory: Graph & Ableitung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <h1>Funktionsgraphen-Memory</h1>
  <div class="subtitle">Findet Paare aus dem Graphen von <span id="subtitleF"></span> und dem Graphen der zugehörigen Ableitung <span id="subtitleFp"></span></div>

  <div class="scoreboard">
    <div class="player-card active" id="p1card">
      <div class="p-name">Spieler 1</div>
      <div class="p-score" id="p1score">0 Paare</div>
    </div>

    <div class="center-controls">
      <div class="turn-indicator" id="turnIndicator"><span class="turn-dot"></span><span id="turnText">Spieler 1 ist am Zug</span></div>
    </div>

    <div class="player-card" id="p2card">
      <div class="p-name">Spieler 2</div>
      <div class="p-score" id="p2score">0 Paare</div>
    </div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<div class="win-overlay" id="winOverlay">
  <div class="win-modal">
    <div class="win-message" id="winMessage"></div>
    <button class="newgame-btn win-modal-btn" id="winNewGameBtn">Neues Spiel</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
